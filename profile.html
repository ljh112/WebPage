<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人信息 | 我的链接主页</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>我的链接主页</span>
      </div>
      <nav class="nav-links">
        <a href="./index.html">主页</a>
        <a href="./profile.html" aria-current="page">个人信息</a>
      </nav>
    </header>

    <main class="container">
      <section class="panel profile-panel">
        <h1>个人信息子页（后续可扩展）</h1>
        <p>
          这里预留给你的个人介绍、项目经历、联系方式、社媒入口等内容。你后面告诉我偏好，我可以继续帮你做成更完整的个人展示页。
        </p>
        <div class="profile-grid">
          <article>
            <h2>基础信息</h2>
            <p>姓名 / 昵称</p>
            <p>城市 / 方向</p>
            <p>一句话介绍</p>
          </article>
          <article>
            <h2>技能标签</h2>
            <p>前端开发</p>
            <p>自动化工具</p>
            <p>效率系统</p>
          </article>
          <article>
            <h2>联系我</h2>
            <p>邮箱：you@example.com</p>
            <p>GitHub：your-account</p>
            <p>公众号/博客：your-site</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
