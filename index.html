<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ljhiokc 的主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        const key = "personal-portal-theme-v1";
        const saved = localStorage.getItem(key);
        if (saved) {
          document.documentElement.dataset.theme = saved;
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span id="site-title">ljhiokc 的主页</span>
      </div>
      <div class="topbar-right">
        <div id="live-clock" class="clock-pill" aria-live="polite"></div>
        <button id="theme-toggle-btn" class="theme-toggle" type="button" aria-label="切换主题"></button>
        <nav class="nav-links">
          <a href="./index.html" aria-current="page">主页</a>
          <a href="./profile.html">个人信息</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1 id="hero-title">常用入口，一页速达</h1>
        <p id="hero-desc">把日常网站与工具收进一个面板，搜索、分类、拖拽排序都更顺手。</p>
        <p id="hero-status" class="hero-status"></p>
        <div class="hero-actions">
          <div class="web-search-group">
            <label class="engine-picker" for="web-search-engine">
              <img
                id="web-search-engine-icon"
                class="engine-icon"
                src="./assets/icons/search-engines/google.png"
                alt=""
                aria-hidden="true"
              />
              <select id="web-search-engine" class="search-engine-select" aria-label="选择搜索引擎">
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="baidu">百度</option>
                <option value="duckduckgo">DuckDuckGo</option>
              </select>
              <span class="engine-caret" aria-hidden="true">▾</span>
            </label>
            <input
              id="web-search-input"
              class="search-input web-search-input"
              type="search"
              placeholder="输入关键词后按回车"
              autocomplete="off"
            />
            <button id="web-search-btn" class="btn btn-primary" type="button">Go!</button>
          </div>
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="筛选链接名称或分类（按 / 快速聚焦）"
            autocomplete="off"
          />
          <button id="add-link-btn" class="btn btn-primary" type="button">新增链接</button>
          <button id="export-btn" class="btn" type="button">导出配置</button>
          <button id="import-btn" class="btn" type="button">导入配置</button>
          <button id="reset-btn" class="btn btn-danger" type="button">恢复默认</button>
          <input id="import-file-input" type="file" accept=".json,application/json" hidden />
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>分类</h2>
          <span id="link-count"></span>
        </div>
        <div id="category-chips" class="chips"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>快速访问</h2>
          <span class="hint">按数字 1-9 可直接打开前 9 个链接，拖拽卡片可排序</span>
        </div>
        <div id="links-grid" class="links-grid"></div>
      </section>
    </main>

    <dialog id="link-dialog" class="link-dialog">
      <form id="link-form" method="dialog">
        <h3 id="dialog-title">新增链接</h3>
        <input id="link-id" type="hidden" />

        <label>
          名称
          <input id="link-name" type="text" required maxlength="40" />
        </label>
        <label>
          URL
          <input id="link-url" type="url" required placeholder="https://example.com" />
        </label>
        <label>
          分类
          <input id="link-category" type="text" required maxlength="20" placeholder="工具 / 学习 / 社交..." />
        </label>
        <label>
          图标（emoji 或图片 URL/路径，可选）
          <input id="link-icon" type="text" maxlength="200" placeholder="🚀 或 ./assets/icons/links/github.png" />
        </label>

        <menu>
          <button type="button" id="cancel-dialog-btn" class="btn">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </menu>
      </form>
    </dialog>

    <template id="link-card-template">
      <article class="link-card">
        <a class="link-main" target="_blank" rel="noreferrer noopener">
          <span class="link-icon"></span>
          <span class="link-meta">
            <strong class="link-name"></strong>
            <small class="link-category"></small>
          </span>
          <span class="link-index"></span>
        </a>
        <div class="link-actions">
          <button type="button" class="icon-btn edit-btn" title="编辑">编辑</button>
          <button type="button" class="icon-btn delete-btn" title="删除">删除</button>
        </div>
      </article>
    </template>

    <script src="./theme.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
